<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #161618;
      --surface-2: #1e1e21;
      --border: #2a2a2e;
      --accent: #c8f04e;
      --accent-dim: rgba(200, 240, 78, 0.12);
      --text: #f0f0f0;
      --text-muted: #6b6b75;
      --text-soft: #a0a0a8;
      --danger: #ff5555;
      --danger-dim: rgba(255, 85, 85, 0.1);
      --done: #4ade80;
      --radius: 14px;
      --radius-sm: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 80px;
      overflow-x: hidden;
    }

    /* Ambient background blobs */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(200,240,78,0.06) 0%, transparent 70%);
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -200px; right: -200px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(100,100,255,0.05) 0%, transparent 70%);
      pointer-events: none;
      animation: drift 16s ease-in-out infinite alternate-reverse;
    }

    @keyframes drift {
      from { transform: translate(0, 0); }
      to   { transform: translate(40px, 30px); }
    }

    /* Header */
    header {
      width: 100%;
      max-width: 640px;
      margin-bottom: 48px;
      animation: fadeDown 0.6s ease both;
    }

    .header-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.4rem, 6vw, 3.6rem);
      font-weight: 800;
      line-height: 1.0;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      margin-top: 10px;
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 300;
      font-style: italic;
    }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 24px;
      margin-top: 28px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      transition: all 0.3s;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .stat-divider {
      width: 1px;
      background: var(--border);
      align-self: stretch;
    }

    /* Input card */
    .input-card {
      width: 100%;
      max-width: 640px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 24px;
      animation: fadeDown 0.6s ease 0.1s both;
      position: relative;
      overflow: hidden;
    }

    .input-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.4;
    }

    .task-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      caret-color: var(--accent);
    }

    .task-input::placeholder {
      color: var(--text-muted);
      font-style: italic;
      font-weight: 300;
    }

    .add-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 10px 20px;
      background: var(--accent);
      color: #0d0d0f;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      white-space: nowrap;
    }

    .add-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(200, 240, 78, 0.3);
    }

    .add-btn:active { transform: translateY(0); }

    .add-btn svg { width: 14px; height: 14px; }

    /* Filter tabs */
    .filters {
      width: 100%;
      max-width: 640px;
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      animation: fadeDown 0.6s ease 0.15s both;
    }

    .filter-btn {
      padding: 7px 16px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .filter-btn:hover:not(.active) {
      border-color: #444;
      color: var(--text-soft);
    }

    /* Task list */
    .task-list {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: fadeDown 0.6s ease 0.2s both;
    }

    .task-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.2s, transform 0.2s, opacity 0.3s;
      animation: slideIn 0.3s ease both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-item:hover {
      border-color: #3a3a3e;
      transform: translateX(2px);
    }

    .task-item.completed {
      opacity: 0.5;
    }

    .task-item.removing {
      animation: slideOut 0.3s ease forwards;
    }

    @keyframes slideOut {
      to { opacity: 0; transform: translateX(-20px); max-height: 0; padding: 0; margin: 0; }
    }

    /* Checkbox */
    .check-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .check-wrap input[type="checkbox"] {
      appearance: none;
      width: 20px; height: 20px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
    }

    .check-wrap input[type="checkbox"]:checked {
      background: var(--done);
      border-color: var(--done);
    }

    .check-wrap input[type="checkbox"]:checked::after {
      content: '';
      display: block;
      width: 5px; height: 9px;
      border: 2px solid #0d0d0f;
      border-top: none; border-left: none;
      transform: rotate(45deg) translate(3px, 0px);
    }

    .check-wrap input[type="checkbox"]:hover {
      border-color: var(--done);
    }

    /* Task text */
    .task-text-wrap {
      flex: 1;
      min-width: 0;
    }

    .task-title {
      font-size: 15px;
      font-weight: 400;
      color: var(--text);
      transition: color 0.2s;
      word-break: break-word;
    }

    .task-item.completed .task-title {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .task-id {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
      font-family: 'DM Sans', sans-serif;
      font-style: italic;
    }

    /* Delete btn */
    .delete-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-muted);
      width: 32px; height: 32px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      background: var(--danger-dim);
      border-color: var(--danger);
      color: var(--danger);
    }

    .delete-btn svg { width: 15px; height: 15px; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 64px 20px;
      animation: fadeDown 0.4s ease both;
    }

    .empty-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .empty-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text-soft);
      margin-bottom: 8px;
    }

    .empty-sub {
      font-size: 13px;
      color: var(--text-muted);
      font-style: italic;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 10px 20px;
      font-size: 13px;
      color: var(--text-soft);
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.success { border-color: var(--accent); color: var(--accent); }
    .toast.error   { border-color: var(--danger); color: var(--danger); }

    /* Loading spinner */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px;
      color: var(--text-muted);
      font-size: 14px;
      font-style: italic;
    }

    /* Connection status */
    .connection-bar {
      width: 100%;
      max-width: 640px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      font-size: 12px;
      color: var(--text-muted);
      animation: fadeDown 0.4s ease both;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
    }
    .dot.connected { background: var(--done); box-shadow: 0 0 6px var(--done); }
    .dot.error     { background: var(--danger); }
    .dot.loading   { background: var(--accent); animation: pulse 1s infinite; }

    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.3 } }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-label">Personal Workspace</div>
    <h1>Task<span>Flow</span></h1>
    <p class="subtitle">Stay sharp. Get things done.</p>
    <div class="stats">
      <div class="stat">
        <span class="stat-num" id="stat-total">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-num" id="stat-pending">0</span>
        <span class="stat-label">Pending</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-num" id="stat-done">0</span>
        <span class="stat-label">Done</span>
      </div>
    </div>
  </header>

  <div class="connection-bar">
    <div class="dot loading" id="conn-dot"></div>
    <span id="conn-label">Connecting to backend…</span>
  </div>

  <div class="input-card">
    <input
      class="task-input"
      type="text"
      id="task-input"
      placeholder="What needs to be done?"
      autocomplete="off"
    />
    <button class="add-btn" id="add-btn" onclick="addTask()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Add Task
    </button>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
    <button class="filter-btn" onclick="setFilter('completed', this)">Completed</button>
  </div>

  <div class="task-list" id="task-list">
    <div class="loading-row"><div class="spinner"></div> Loading tasks…</div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = '';
    let allTasks = [];
    let currentFilter = 'all';

    // ── Connection status ────────────────────────────────
    function setConnStatus(state, label) {
      const dot = document.getElementById('conn-dot');
      const lbl = document.getElementById('conn-label');
      dot.className = 'dot ' + state;
      lbl.textContent = label;
    }

    // ── Toast ────────────────────────────────────────────
    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show ' + type;
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.className = 'toast', 2800);
    }

    // ── Stats ────────────────────────────────────────────
    function updateStats() {
      const total   = allTasks.length;
      const done    = allTasks.filter(t => t.completed).length;
      const pending = total - done;
      document.getElementById('stat-total').textContent   = total;
      document.getElementById('stat-pending').textContent = pending;
      document.getElementById('stat-done').textContent    = done;
    }

    // ── Render ───────────────────────────────────────────
    function renderTasks() {
      const list = document.getElementById('task-list');
      const visible = allTasks.filter(t => {
        if (currentFilter === 'pending')   return !t.completed;
        if (currentFilter === 'completed') return  t.completed;
        return true;
      });

      if (visible.length === 0) {
        const msgs = {
          all:       ['Nothing here yet', 'Add your first task above!'],
          pending:   ['All caught up!', 'No pending tasks — great work.'],
          completed: ['No completed tasks', 'Finish something first!'],
        };
        const [title, sub] = msgs[currentFilter];
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">✦</div>
            <div class="empty-title">${title}</div>
            <div class="empty-sub">${sub}</div>
          </div>`;
        return;
      }

      list.innerHTML = '';
      visible.forEach((task, i) => {
        const el = document.createElement('div');
        el.className = 'task-item' + (task.completed ? ' completed' : '');
        el.id = 'task-' + task.id;
        el.style.animationDelay = (i * 40) + 'ms';
        el.innerHTML = `
          <div class="check-wrap">
            <input type="checkbox" ${task.completed ? 'checked' : ''}
              onchange="toggleTask(${task.id}, this.checked)" />
          </div>
          <div class="task-text-wrap">
            <div class="task-title">${escHtml(task.title)}</div>
            <div class="task-id">#${task.id}</div>
          </div>
          <button class="delete-btn" onclick="deleteTask(${task.id})" title="Delete">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
              <path d="M10 11v6M14 11v6"/>
              <path d="M9 6V4h6v2"/>
            </svg>
          </button>`;
        list.appendChild(el);
      });
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Fetch all tasks ──────────────────────────────────
    async function fetchTasks() {
      try {
        const res = await fetch(`${API}/tasks`);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        allTasks = await res.json();
        setConnStatus('connected', 'Connected to localhost:8080');
        updateStats();
        renderTasks();
      } catch (e) {
        setConnStatus('error', 'Cannot reach backend — is Spring Boot running?');
        document.getElementById('task-list').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⚠</div>
            <div class="empty-title">Backend not reachable</div>
            <div class="empty-sub">Make sure your Spring Boot app is running on port 8080</div>
          </div>`;
      }
    }

    // ── Add task ─────────────────────────────────────────
    async function addTask() {
      const input = document.getElementById('task-input');
      const title = input.value.trim();
      if (!title) { input.focus(); showToast('Please enter a task title', 'error'); return; }

      const btn = document.getElementById('add-btn');
      btn.disabled = true;
      btn.textContent = '…';

      try {
        const res = await fetch(`${API}/tasks`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, completed: false })
        });
        if (!res.ok) throw new Error();
        input.value = '';
        await fetchTasks();
        showToast('Task added ✓', 'success');
      } catch {
        showToast('Failed to add task', 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg> Add Task`;
      }
    }

    // ── Delete task ──────────────────────────────────────
    async function deleteTask(id) {
      const el = document.getElementById('task-' + id);
      if (el) el.classList.add('removing');
      await new Promise(r => setTimeout(r, 280));

      try {
        const res = await fetch(`${API}/tasks/${id}`, { method: 'DELETE' });
        if (!res.ok) throw new Error();
        await fetchTasks();
        showToast('Task removed', '');
      } catch {
        showToast('Failed to delete task', 'error');
        await fetchTasks(); // re-render if failed
      }
    }

    // ── Toggle complete (local only — no backend endpoint yet) ──
       async function toggleTask(id, checked) {
    const task = allTasks.find(t => t.id === id);
    if (!task) return;
    task.completed = checked;
    try {
        await fetch(`${API}/tasks/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(task)
        });
        updateStats();
        renderTasks();
        showToast(checked ? 'Marked as done ✓' : 'Marked as pending', checked ? 'success' : '');
    } catch {
        showToast('Failed to update task', 'error');
    }
}
     
    // ── Filter ───────────────────────────────────────────
    function setFilter(f, btn) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTasks();
    }

    // ── Enter key ─────────────────────────────────────────
    document.getElementById('task-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    // ── Init ─────────────────────────────────────────────
    fetchTasks();
  </script>
</body>
</html>
